<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SenseHAT Live Data</title>
  <style>
    body { font-family: monospace; max-width: 700px; margin: 40px auto; padding: 0 16px; background: #111; color: #eee; }
    h1 { color: #7cf; margin-bottom: 4px; }
    #status { font-size: 0.85em; margin-bottom: 20px; }
    #status.connected { color: #7f7; }
    #status.disconnected { color: #f77; }
    #timestamp { color: #aaa; font-size: 0.85em; margin-bottom: 16px; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; border-bottom: 1px solid #444; padding: 6px 8px; color: #aaa; font-weight: normal; }
    td { padding: 6px 8px; border-bottom: 1px solid #222; }
    td:last-child { color: #aaa; }
    .section { color: #7cf; font-weight: bold; background: #1a1a2e; }
    .slider-row { margin-top: 24px; display: flex; align-items: center; gap: 12px; }
    input[type=range] { flex: 1; accent-color: #7cf; }
  </style>
</head>
<body>
  <h1>SenseHAT Live Data</h1>
  <div id="status" class="disconnected">Connecting to MQTT broker…</div>
  <div id="timestamp"></div>
  <table>
    <thead>
      <tr><th>Sensor</th><th>Value</th><th>Unit</th></tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>

  <div class="slider-row">
    <label for="slider">Interval:</label>
    <input type="range" id="slider" min="100" max="5000" step="100" value="5000">
    <span id="slider-val">5 s</span>
  </div>

  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <script>
    const brokerUrl = `ws://${window.location.hostname}:30901`;
    const topic = "sensehat/readings";
    const intervalTopic = "sensehat/interval";

    const statusEl   = document.getElementById("status");
    const tsEl       = document.getElementById("timestamp");
    const rowsEl     = document.getElementById("rows");

    const ROWS = [
      { key: "temperature",              label: "Temperature",   unit: "°C" },
      { key: "humidity",                 label: "Humidity",      unit: "%" },
      { key: "pressure",                 label: "Pressure",      unit: "hPa" },
      { key: null,                       label: "Accelerometer", unit: "",   section: true },
      { key: "accelerometer.x",          label: "  X",           unit: "g" },
      { key: "accelerometer.y",          label: "  Y",           unit: "g" },
      { key: "accelerometer.z",          label: "  Z",           unit: "g" },
      { key: null,                       label: "Gyroscope",     unit: "",   section: true },
      { key: "gyroscope.x",              label: "  X",           unit: "°/s" },
      { key: "gyroscope.y",              label: "  Y",           unit: "°/s" },
      { key: "gyroscope.z",              label: "  Z",           unit: "°/s" },
      { key: null,                       label: "Magnetometer",  unit: "",   section: true },
      { key: "magnetometer.x",           label: "  X",           unit: "G" },
      { key: "magnetometer.y",           label: "  Y",           unit: "G" },
      { key: "magnetometer.z",           label: "  Z",           unit: "G" },
    ];

    function get(obj, path) {
      return path.split(".").reduce((o, k) => o?.[k], obj);
    }

    function render(data) {
      tsEl.textContent = "Last update: " + new Date(data.ts).toLocaleTimeString();
      rowsEl.innerHTML = ROWS.map(row => {
        if (row.section) {
          return `<tr><td colspan="3" class="section">${row.label}</td></tr>`;
        }
        const val = get(data, row.key);
        return `<tr><td>${row.label}</td><td>${val}</td><td>${row.unit}</td></tr>`;
      }).join("");
    }

    const client = mqtt.connect(brokerUrl);

    const slider   = document.getElementById("slider");
    const sliderVal = document.getElementById("slider-val");

    function fmtInterval(ms) {
      return ms < 1000 ? (ms / 1000).toFixed(1) + " s" : (ms / 1000) + " s";
    }

    slider.addEventListener("input", () => {
      sliderVal.textContent = fmtInterval(Number(slider.value));
    });

    slider.addEventListener("change", () => {
      client.publish(intervalTopic, slider.value, { retain: true });
    });

    client.on("connect", () => {
      statusEl.textContent = "Connected to " + brokerUrl;
      statusEl.className = "connected";
      client.subscribe(topic);
    });

    client.on("disconnect", () => {
      statusEl.textContent = "Disconnected";
      statusEl.className = "disconnected";
    });

    client.on("message", (t, payload) => {
      try { render(JSON.parse(payload.toString())); }
      catch (e) { console.error("Bad payload", e); }
    });
  </script>
</body>
</html>
