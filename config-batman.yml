---
- name: Run non-interactive script on all hosts
  hosts: all
  become: yes
  vars:
    script_name: config_batman.sh
    mesh_ip_prefix: "192.168.3"
    base_ip_start: 241

  tasks:
    - name: Install batman
      ansible.builtin.apt:
        name: batctl
        state: present

    - name: Execute script with mesh IP argument
      ansible.builtin.shell: >
        nohup
        {{ script_name }}
        {{ mesh_ip_prefix }}.{{ base_ip_start + groups['all'].index(inventory_hostname) }}
      register: script_output

    - name: Show output
      debug:
        var: script_output.stdout

- name: Run bridge script on manager
  hosts: manager_group
  become: yes
  vars:
    script_name: bridge.sh

  tasks:
    - name: Execute script
      ansible.builtin.script: "{{ script_name }} > /var/log/bridge_setup.log 2>&1"
      async: 10
      poll: 0
      ignore_unreachable: true

    - name: Wait for connection
      ansible.builtin.wait_for_connection:
        delay: 5
        timeout: 60

    - name: Read log file contents # Write to log because connection is lost during ip flush in bridge script
      ansible.builtin.command: "cat /var/log/bridge_setup.log"
      register: log_output

    - name: Show script output
      debug:
        var: log_output.stdout
