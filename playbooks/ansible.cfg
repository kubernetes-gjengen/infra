[defaults]
  inventory = inventories/discover.py
  host_key_checking = False
  interpreter_python = auto_silent
  timeout = 30
  become_timeout = 30
  # Default is 5, which serializes every task into batches when the cluster
  # has more hosts than that. Set comfortably above the realistic node count
  # so every play runs all hosts for a task in a single batch.
  forks = 30

[ssh_connection]
  ssh_args = -o ServerAliveInterval=10 -o ServerAliveCountMax=3 -o ControlMaster=auto -o ControlPersist=60s
  pipelining = True

