---
- name: Run non-interactive script on all hosts
  hosts: all
  become: true
  vars:
    mesh_ip_prefix: "192.168.42"
    base_ip_start: 1

  tasks:
    - name: Provision batman on node
      include_tasks: tasks/provision_batman_node.yml
      vars:
        mesh_ip: "{{ mesh_ip_prefix }}.{{ base_ip_start + groups['all'].index(inventory_hostname) }}"
        gateway_ip: "{{ mesh_ip_prefix }}.{{ base_ip_start }}"

- name: Configure NAT routing
  hosts: manager
  become: true

  vars:
    wan_interface: eth0
    bat_interface: bat0

  tasks:
    - name: Install iptables
      ansible.builtin.apt:
        name: iptables
        state: present

    - name: Enable IP forwarding
      ansible.posix.sysctl:
        name: net.ipv4.ip_forward
        value: "1"
        sysctl_set: true
        state: present
        reload: true

    - name: Ensure destination directory exists
      ansible.builtin.file:
        path: /etc/iptables
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Deploy iptables rules file
      ansible.builtin.template:
        src: templates/nat-routing.rules.j2
        dest: /etc/iptables/nat-routing.rules
        owner: root
        group: root
        mode: "0640"
      notify: Restart nat-routing

    - name: Deploy nat-routing systemd service
      ansible.builtin.copy:
        src: files/nat-routing.service
        dest: /etc/systemd/system/nat-routing.service
        owner: root
        group: root
        mode: "0644"
      notify:
        - Reload systemd
        - Restart nat-routing

    - name: Enable and start nat-routing service
      ansible.builtin.systemd:
        name: nat-routing
        enabled: true
        state: started

    - name: Remove bat0 default gateway
      ansible.builtin.shell: ip r del default dev bat0

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart nat-routing
      ansible.builtin.systemd:
        name: nat-routing
        state: restarted
