---
- name: Run non-interactive script on all hosts
  hosts: all
  become: true
  vars:
    script_name: config_batman.sh
    mesh_ip_prefix: "192.168.42"
    base_ip_start: 1

  tasks:
    - name: Install batman
      ansible.builtin.apt:
        name: batctl
        state: present

    - name: copy script
      copy:
        src: "{{ script_name}}"
        dest: "/tmp/{{ script_name }}"
        mode: "0755"

    - name: Execute script with mesh IP argument
      ansible.builtin.shell: >
        nohup
        /tmp/{{ script_name }}
        {{ mesh_ip_prefix }}.{{ base_ip_start + groups['all'].index(inventory_hostname) }} {{ mesh_ip_prefix }}.{{ base_ip_start }}
        > /var/log/config_batman.log 2>&1
      async: 10
      poll: 0
      ignore_unreachable: true

    - name: Wait for connection
      ansible.builtin.wait_for_connection:
        delay: 5
        timeout: 60

    - name: Read script log
      ansible.builtin.command: cat /var/log/config_batman.log
      register: script_log
      changed_when: false

    - name: Show script output
      ansible.builtin.debug:
        var: script_log.stdout_lines

- name: Configure NAT routing
  hosts: manager
  become: true

  vars:
    wan_interface: eth0
    bat_interface: bat0

  tasks:
    - name: Install iptables
      ansible.builtin.apt:
        name: iptables
        state: present

    - name: Enable IP forwarding
      ansible.posix.sysctl:
        name: net.ipv4.ip_forward
        value: "1"
        sysctl_set: true
        state: present
        reload: true

    - name: Ensure destination directory exists
      ansible.builtin.file:
        path: /etc/iptables
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Deploy iptables rules file
      ansible.builtin.template:
        src: templates/nat-routing.rules.j2
        dest: /etc/iptables/nat-routing.rules
        owner: root
        group: root
        mode: "0640"
      notify: Restart nat-routing

    - name: Deploy nat-routing systemd service
      ansible.builtin.copy:
        src: files/nat-routing.service
        dest: /etc/systemd/system/nat-routing.service
        owner: root
        group: root
        mode: "0644"
      notify:
        - Reload systemd
        - Restart nat-routing

    - name: Enable and start nat-routing service
      ansible.builtin.systemd:
        name: nat-routing
        enabled: true
        state: started

    - name: Remove bat0 default gateway
      ansible.builtin.shell: ip r del default dev bat0

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart nat-routing
      ansible.builtin.systemd:
        name: nat-routing
        state: restarted
