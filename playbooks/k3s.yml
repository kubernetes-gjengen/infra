- name: Set hostname
  hosts: all
  become: true

  tasks:
    - name: Set hostname
      ansible.builtin.hostname:
        name: "{{ inventory_hostname }}"

- name: Install k3s manager
  hosts: manager
  tasks:
    - name: Read cmdline.txt
      ansible.builtin.slurp:
        path: /boot/firmware/cmdline.txt
      register: cmdline

    - name: Build updated cmdline
      ansible.builtin.set_fact:
        new_cmdline: >-
          {{
            (cmdline.content | b64decode | trim)
            + ' '
            + (
              [
                'cgroup_enable=cpuset',
                'cgroup_enable=memory',
                'cgroup_memory=1',
                'systemd.unified_cgroup_hierarchy=1'
              ]
              | reject('in', cmdline.content | b64decode)
              | join(' ')
            )
          }}

    - name: Write updated cmdline.txt
      ansible.builtin.copy:
        dest: /boot/firmware/cmdline.txt
        content: "{{ new_cmdline }}\n"
        mode: '0644'
      when: new_cmdline != (cmdline.content | b64decode | trim)
    
    - name: Reboot manager
      ansible.builtin.reboot:
        reboot_timeout: 120
        post_reboot_delay: 30

    - name: Install k3s
      become: true
      shell: curl -sfL https://get.k3s.io | sh -
    - name: Extract join token from output
      become: true
      register: join_token
      shell: cat /var/lib/rancher/k3s/server/node-token

- name: Install k3s worker
  hosts: worker
  tasks:
    - name: Install k3s
      become: true
      shell: curl -sfL https://get.k3s.io | K3S_URL=https://{{ hostvars["manager"]["ansible_host"]}}:6443 K3S_TOKEN={{ hostvars["manager"]["join_token"].stdout }} sh -
- name: Copy k3s config
  hosts: manager
  tasks:
    - name: Copy k3s config
      become: true
      fetch:
        src: /etc/rancher/k3s/k3s.yaml
        dest: kubeconfig.yml
        flat: yes

- name: Set up Logs directory
  hosts: all
  tasks:
    - name: Create logs directory
      become: true
      file:
        path: /logs
        state: directory
    - name: Chown logs directory
      become: true
      shell: chown root /logs
    - name: Set permissions on logs directory
      become: true
      shell: chmod 777 /logs
