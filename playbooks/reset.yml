---
# Tears down all provisioning on every node and returns them to a clean
# stock state. Safe to run on a partially provisioned cluster — every task is
# guarded with failed_when: false or stat checks.
#
# Order matters:
#   1. k3s agents (workers) before k3s server (manager)
#   2. batman.service stopped before interface teardown
#   3. dnsmasq removed before systemd-resolved is restored
#   4. Reboot last to flush remaining kernel state

- name: Uninstall k3s agent from workers
  hosts: worker
  become: true

  tasks:
    - name: Check if k3s-agent uninstall script exists
      ansible.builtin.stat:
        path: /usr/local/bin/k3s-agent-uninstall.sh
      register: k3s_agent_uninstall

    - name: Run k3s-agent uninstall script
      ansible.builtin.shell: /usr/local/bin/k3s-agent-uninstall.sh
      when: k3s_agent_uninstall.stat.exists

- name: Uninstall k3s server from manager
  hosts: manager
  become: true

  tasks:
    - name: Check if k3s uninstall script exists
      ansible.builtin.stat:
        path: /usr/local/bin/k3s-uninstall.sh
      register: k3s_uninstall

    - name: Run k3s uninstall script
      ansible.builtin.shell: /usr/local/bin/k3s-uninstall.sh
      when: k3s_uninstall.stat.exists

- name: Strip cgroup parameters from cmdline.txt on all nodes
  hosts: all
  become: true

  tasks:
    - name: Strip cgroup parameters
      ansible.builtin.replace:
        path: /boot/firmware/cmdline.txt
        regexp: ' ?(cgroup_enable=cpuset|cgroup_enable=memory|cgroup_memory=1|systemd\.unified_cgroup_hierarchy=1)'
        replace: ''

- name: Reset batman configuration on all hosts
  hosts: all
  become: true

  tasks:
    # Stop the service before tearing down the interfaces it manages,
    # so it cannot re-run and undo the teardown mid-play.
    - name: Stop and disable batman service
      ansible.builtin.systemd:
        name: batman
        state: stopped
        enabled: false
      failed_when: false

    - name: Remove wlan0 from batman-adv mesh
      ansible.builtin.command: batctl if del wlan0
      failed_when: false

    - name: Bring bat0 down
      ansible.builtin.command: ip link set bat0 down
      failed_when: false

    - name: Delete bat0 virtual interface
      ansible.builtin.command: ip link delete bat0
      failed_when: false

    - name: Unload batman-adv kernel module
      ansible.builtin.command: modprobe -r batman-adv
      failed_when: false

    - name: Bring wlan0 down before mode change
      ansible.builtin.command: ip link set wlan0 down
      failed_when: false

    - name: Restore wlan0 to managed mode
      ansible.builtin.command: iwconfig wlan0 mode managed
      failed_when: false

    # Remove the netplan profile that provisioning deployed. Leaving it in place
    # would cause systemd-networkd to error on bat0 (non-existent) on the next
    # boot, and would prevent NetworkManager from managing eth0.
    - name: Remove netplan batman profile
      ansible.builtin.file:
        path: /etc/netplan/90-netplan-batman.yaml
        state: absent

    # Provisioning enabled networkd; disable it so only NetworkManager runs.
    - name: Disable systemd-networkd
      ansible.builtin.systemd:
        name: systemd-networkd
        state: stopped
        enabled: false
      failed_when: false

    - name: Remove batctl and wireless-tools packages
      ansible.builtin.apt:
        name:
          - batctl
          - wireless-tools
        state: absent

    - name: Remove batman config script
      ansible.builtin.file:
        path: /usr/local/bin/config_batman.sh
        state: absent

    - name: Start and enable NetworkManager
      ansible.builtin.systemd:
        name: NetworkManager
        state: started
        enabled: true
      failed_when: false

    - name: Start and enable wpa_supplicant
      ansible.builtin.systemd:
        name: wpa_supplicant
        state: started
        enabled: true
      failed_when: false

    - name: Wait for hosts to stabilize after network changes
      ansible.builtin.wait_for_connection:
        delay: 5
        timeout: 60

- name: Reset NAT routing on manager
  hosts: manager
  become: true

  tasks:
    - name: Stop and disable nat-routing service
      ansible.builtin.systemd:
        name: nat-routing
        state: stopped
        enabled: false
      failed_when: false

    - name: Remove nat-routing systemd service file
      ansible.builtin.file:
        path: /etc/systemd/system/nat-routing.service
        state: absent

    - name: Remove iptables rules file
      ansible.builtin.file:
        path: /etc/iptables/nat-routing.rules
        state: absent

    - name: Flush iptables NAT rules
      ansible.builtin.command: iptables -t nat -F
      failed_when: false

    - name: Flush iptables filter rules
      ansible.builtin.command: iptables -F
      failed_when: false

    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Disable IP forwarding
      ansible.posix.sysctl:
        name: net.ipv4.ip_forward
        value: "0"
        sysctl_set: true
        state: present
        reload: true

- name: Reset DHCP/DNS on manager
  hosts: manager
  become: true

  tasks:
    - name: Stop and disable dnsmasq
      ansible.builtin.systemd:
        name: dnsmasq
        state: stopped
        enabled: false
      failed_when: false

    - name: Remove dnsmasq package
      ansible.builtin.apt:
        name: dnsmasq
        state: absent

    # Restore the systemd-resolved settings that configure_dhcp_server.yml
    # changed. Without this the Pi has no DNS after dnsmasq is gone.
    - name: Restore default DNS resolver
      ansible.builtin.lineinfile:
        path: /etc/systemd/resolved.conf
        regexp: '^\s*#?DNS\b'
        line: "#DNS="

    - name: Restore fallback DNS
      ansible.builtin.lineinfile:
        path: /etc/systemd/resolved.conf
        regexp: '^\s*#?FallbackDNS\b'
        line: "#FallbackDNS="

    - name: Clear local DNS search domain
      ansible.builtin.lineinfile:
        path: /etc/systemd/resolved.conf
        regexp: '^\s*#?Domains\b'
        line: "#Domains="

    - name: Re-enable systemd-resolved stub listener
      ansible.builtin.lineinfile:
        path: /etc/systemd/resolved.conf
        regexp: '^\s*#?DNSStubListener\b'
        line: "#DNSStubListener=yes"

    - name: Restart systemd-resolved
      ansible.builtin.systemd:
        name: systemd-resolved
        state: restarted

- name: Remove remaining artifacts from all hosts
  hosts: all
  become: true

  tasks:
    - name: Stop and disable network_prober service
      ansible.builtin.systemd:
        name: network_prober
        state: stopped
        enabled: false
      failed_when: false

    - name: Remove batman and network_prober service files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/systemd/system/batman.service
        - /etc/systemd/system/network_prober.service

    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Remove /logs directory
      ansible.builtin.file:
        path: /logs
        state: absent

    - name: Remove prober and kubeconfig files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /usr/local/bin/grpcurl
        - /home/pi/message.proto
        - /home/pi/network_prober.sh
        - /home/pi/kubeconfig
        - /etc/bat-hosts

- name: Remove fetched kubeconfig from controller
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Remove kubeconfig.yml
      ansible.builtin.file:
        path: "{{ playbook_dir }}/kubeconfig.yml"
        state: absent

- name: Reboot all hosts to clear remaining runtime state
  hosts: all
  become: true

  tasks:
    - name: Reboot
      ansible.builtin.reboot:
        reboot_timeout: 120
        post_reboot_delay: 10
