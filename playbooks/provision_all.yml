---
# Usage: ansible-playbook provision_all.yml
#
# Uses the default dynamic inventory (inventories/discover.py), which scans the
# LAN for Pis and assigns manager/worker roles + hostnames. Runs are idempotent:
# already-provisioned nodes are verified in place and are not rebooted unless
# their cgroup boot config actually changes.
#
# No task in this repo reads an ansible_* gathered fact (grep confirms it),
# so every play sets gather_facts: false to skip the setup module entirely.
# pi_hostname etc. come from the discover.py inventory, not gathered facts.

- name: Set hostname on all nodes
  hosts: all
  become: true
  gather_facts: false

  tasks:
    - name: Disable cloud-init
      ansible.builtin.include_tasks: tasks/disable_cloud_init.yml

    # Ships preinstalled on stock Pi OS - this just guards against a base
    # image that lacks it. Checked before any network changes so that, once
    # the mesh comes up and eth0 re-DHCPs, the nodes are still reachable at
    # <hostname>.local via mDNS.
    - name: Ensure avahi-daemon is present for .local (mDNS) resolution
      ansible.builtin.apt:
        name: avahi-daemon
        state: present

    - name: Ensure avahi-daemon is enabled and running
      ansible.builtin.systemd:
        name: avahi-daemon
        enabled: true
        state: started

    - name: Set hostname
      ansible.builtin.include_tasks: tasks/set_hostname.yml

    - name: Restart avahi to advertise the new hostname
      ansible.builtin.systemd:
        name: avahi-daemon
        state: restarted
      when: hostname_result is changed

    - name: Configure bashrc prompt
      ansible.builtin.include_tasks: tasks/configure_bashrc_prompt.yml
      tags: configure_prompt

    # discover.py reassigns manager0/workerN names by current IP order on
    # every scan (no persisted identity), so this play can rename many hosts
    # in the same run. Avahi needs a moment to withdraw stale records and
    # announce new ones across the mesh - the very next play immediately
    # depends on .local resolution to reconnect after the network bounce, so
    # give avahi a beat to converge first. Only pauses when a rename actually
    # happened this run; a no-op re-provision skips it.
    - name: Let mDNS converge after hostname changes
      ansible.builtin.command: sleep 15
      delegate_to: localhost
      become: false
      run_once: true
      changed_when: false
      when: ansible_play_hosts | map('extract', hostvars, 'hostname_result') | selectattr('changed') | list | length > 0

- name: Provision common network config
  hosts: all
  become: true
  gather_facts: false

  tasks:
    - name: Provision network on node
      ansible.builtin.include_tasks: tasks/00_configure_network_common.yml

    # Stopping NetworkManager (in 00_configure_network_common.yml) doesn't
    # release the DHCP lease it already holds on eth0, so once networkd
    # requests its own lease, eth0 is left carrying two addresses. Flush it
    # right before netplan apply so networkd's DHCP client starts clean.
    #
    # Both commands tear down and rebuild the interfaces, dropping our SSH
    # session. Fire them and don't wait (poll: 0), then reconnect below via
    # the node's stable <hostname>.local name. Only run this when the netplan
    # profile actually changed, so re-runs don't needlessly bounce the
    # network - that also happens to be exactly when NetworkManager was last
    # stopped, i.e. the only time a stale lease could have been left behind.
    - name: Flush stale eth0 address and apply netplan config (disrupts the connection)
      ansible.builtin.shell: ip addr flush dev eth0 && netplan apply
      async: 60
      poll: 0
      when: netplan_cfg is changed

    - name: Recover from network cataclysm (reconnect over mDNS)
      ansible.builtin.add_host:
        name: "{{ inventory_hostname }}"
        ansible_host: "{{ pi_hostname }}.local"
      when: netplan_cfg is changed

    - name: Reset connection
      ansible.builtin.meta: reset_connection

    - name: Wait for connection
      ansible.builtin.wait_for_connection:
        # A whole-fleet netplan bounce (every host flushing eth0 and
        # re-DHCPing at once) can take longer than a single host's reconnect
        # to settle - DHCP server handling a burst of requests, ARP caches,
        # mDNS reconvergence. Observed spurious "No route to host" failures
        # around 70s elapsed with 60s timeout even though every host came
        # back fine seconds later.
        delay: 10
        timeout: 120

    - name: Reattach bat0 interface
      ansible.builtin.command: ip link set wlan0 master bat0
      changed_when: false

- name: Configure NAT routing on manager
  hosts: manager
  become: true
  gather_facts: false
  vars:
    wan_interface: eth0
    bat_interface: bat0

  tasks:
    - name: Configure NAT
      ansible.builtin.include_tasks: tasks/configure_nat.yml

- name: Configure DHCP/DNS on manager
  hosts: manager
  become: true
  gather_facts: false
  vars:
    bat_interface: bat0
    dhcp_start: "192.168.42.2"
    dhcp_end: "192.168.42.254"
    lease_time: 12
  tasks:
    - name: Configure dnsmasq
      ansible.builtin.include_tasks: tasks/configure_dhcp_server.yml

- name: Install k3s server on manager
  hosts: manager
  become: true
  gather_facts: false

  tasks:
    - name: Install k3s server
      ansible.builtin.include_tasks: tasks/install_k3s_manager.yml

- name: Configure cgroup parameters on workers
  hosts: worker
  become: true
  gather_facts: false

  tasks:
    - name: Configure cgroups
      ansible.builtin.include_tasks: tasks/configure_cgroups.yml

- name: Fetch k3s join token from manager
  hosts: manager
  become: true
  gather_facts: false

  tasks:
    - name: Read join token
      ansible.builtin.shell: cat /var/lib/rancher/k3s/server/node-token
      register: k3s_join_token
      changed_when: false

- name: Reboot workers to apply cgroup settings
  hosts: worker
  become: true
  gather_facts: false

  tasks:
    # Only reboot nodes whose cmdline.txt was actually rewritten - already
    # provisioned workers keep running untouched.
    - name: Reboot
      ansible.builtin.reboot:
        reboot_timeout: 120
        post_reboot_delay: 60
      when: cgroups_changed | default(false)

- name: Install k3s agent on workers
  hosts: worker
  become: true
  gather_facts: false

  tasks:
    - name: Install k3s agent
      ansible.builtin.include_tasks: tasks/install_k3s_worker.yml

- name: Fetch k3s config to controller
  hosts: manager
  gather_facts: false
  tags: fetch_kubeconfig

  tasks:
    # k3s.yaml always hardcodes server: https://127.0.0.1:6443 - fine on the
    # manager itself, useless fetched raw to a remote controller. Substitute
    # in the manager's actual wired IP, queried fresh here rather than taken
    # from ansible_host, since a prior play in this same run may have
    # redirected ansible_host to the mDNS name after a netplan bounce - and
    # k3s's self-signed cert's SANs cover the real IP, not that hostname.
    - name: Get manager's wired IP
      ansible.builtin.shell: ip -4 addr show eth0 | grep -oP '(?<=inet )[\d.]+'
      register: manager_wired_ip
      changed_when: false

    - name: Read manager kubeconfig
      become: true
      ansible.builtin.slurp:
        src: /etc/rancher/k3s/k3s.yaml
      register: manager_kubeconfig

    - name: Write kubeconfig to controller, pointed at the manager's reachable address
      ansible.builtin.copy:
        content: >-
          {{ (manager_kubeconfig.content | b64decode).replace(
            'https://127.0.0.1:6443',
            'https://' + (manager_wired_ip.stdout | trim) + ':6443'
          ) }}
        dest: "{{ playbook_dir }}/kubeconfig.yml"
      delegate_to: localhost

- name: Detect and label node capabilities
  hosts: all
  gather_facts: false
  tags: detect_capabilities
  vars_files:
    - capabilities.yml

  tasks:
    - name: Detect capabilities and label node
      ansible.builtin.include_tasks: tasks/detect_capabilities.yml

- name: Set up logs directory on all nodes
  hosts: all
  become: true
  gather_facts: false

  tasks:
    - name: Set up logs
      ansible.builtin.include_tasks: tasks/setup_logs.yml

- name: Configure network prober
  hosts: manager:worker
  tags: prober
  become: true
  gather_facts: false

  vars:
    manager_bat_ip: "{{ manager_mesh_ip }}"
    grpc_host: "{{ manager_mesh_ip }}"
    grpc_port: "30042"

  handlers:
    - name: Restart network_prober
      ansible.builtin.systemd:
        name: network_prober
        daemon_reload: true
        state: restarted

  tasks:
    - name: Configure network prober
      ansible.builtin.include_tasks: probe.yml
