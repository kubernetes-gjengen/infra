---
# Usage: ansible-playbook provision_all.yml
#
# Uses the default dynamic inventory (inventories/discover.py), which scans the
# LAN for Pis and assigns manager/worker roles + hostnames. Runs are idempotent:
# already-provisioned nodes are verified in place and are not rebooted unless
# their cgroup boot config actually changes.
#
# Facts are gathered once in the first play (hosts: all).
# All subsequent plays set gather_facts: false — hostvars retains the
# cached facts for the entire playbook run, so nothing is lost.

- name: Set hostname on all nodes
  hosts: all
  become: true

  # pi_hostname (manager0 / workerN) is supplied by the discover.py inventory.

  tasks:
    - name: Disable cloud-init
      ansible.builtin.include_tasks: tasks/disable_cloud_init.yml

    # Installed before any network changes so that, once the mesh comes up and
    # eth0 re-DHCPs, the nodes are still reachable at <hostname>.local via mDNS.
    - name: Install avahi-daemon for .local (mDNS) resolution
      ansible.builtin.apt:
        name: avahi-daemon
        state: present

    - name: Ensure avahi-daemon is enabled and running
      ansible.builtin.systemd:
        name: avahi-daemon
        enabled: true
        state: started

    - name: Set hostname
      ansible.builtin.include_tasks: tasks/set_hostname.yml

    - name: Restart avahi to advertise the new hostname
      ansible.builtin.systemd:
        name: avahi-daemon
        state: restarted
      when: hostname_result is changed

    - name: Configure bashrc prompt
      ansible.builtin.include_tasks: tasks/configure_bashrc_prompt.yml
      tags: configure_prompt

- name: Provision common network config
  hosts: all
  become: true
  gather_facts: false

  tasks:
    - name: Provision network on node
      ansible.builtin.include_tasks: tasks/00_configure_network_common.yml

    # netplan apply tears down and rebuilds the interfaces, dropping our SSH
    # session. Fire it and don't wait (poll: 0), then reconnect below via the
    # node's stable <hostname>.local name. Only run it when the netplan profile
    # actually changed, so re-runs don't needlessly bounce the network.
    - name: Apply netplan config (disrupts the connection)
      ansible.builtin.command: netplan apply
      async: 60
      poll: 0
      when: netplan_cfg is changed

    - name: Recover from network cataclysm (reconnect over mDNS)
      ansible.builtin.add_host:
        name: "{{ inventory_hostname }}"
        ansible_host: "{{ pi_hostname }}.local"
      when: netplan_cfg is changed

    - name: Reset connection
      ansible.builtin.meta: reset_connection

    - name: Wait for connection
      ansible.builtin.wait_for_connection:
        delay: 5
        timeout: 60

    - name: Reattach bat0 interface
      ansible.builtin.command: ip link set wlan0 master bat0
      changed_when: false

- name: Configure NAT routing on manager
  hosts: manager
  become: true
  gather_facts: false
  vars:
    wan_interface: eth0
    bat_interface: bat0

  tasks:
    - name: Configure NAT
      ansible.builtin.include_tasks: tasks/configure_nat.yml

- name: Configure DHCP/DNS on manager
  hosts: manager
  become: true
  gather_facts: false
  vars:
    bat_interface: bat0
    dhcp_start: "192.168.42.2"
    dhcp_end: "192.168.42.254"
    lease_time: 12
  tasks:
    - name: Configure dnsmasq
      ansible.builtin.include_tasks: tasks/configure_dhcp_server.yml

- name: Install k3s server on manager
  hosts: manager
  become: true
  gather_facts: false

  tasks:
    - name: Install k3s server
      ansible.builtin.include_tasks: tasks/install_k3s_manager.yml

- name: Configure cgroup parameters on workers
  hosts: worker
  become: true
  gather_facts: false

  tasks:
    - name: Configure cgroups
      ansible.builtin.include_tasks: tasks/configure_cgroups.yml

- name: Fetch k3s join token from manager
  hosts: manager
  become: true
  gather_facts: false

  tasks:
    - name: Read join token
      ansible.builtin.shell: cat /var/lib/rancher/k3s/server/node-token
      register: k3s_join_token

- name: Reboot workers to apply cgroup settings
  hosts: worker
  become: true
  gather_facts: false

  tasks:
    # Only reboot nodes whose cmdline.txt was actually rewritten - already
    # provisioned workers keep running untouched.
    - name: Reboot
      ansible.builtin.reboot:
        reboot_timeout: 120
        post_reboot_delay: 60
      when: cgroups_changed | default(false)

- name: Install k3s agent on workers
  hosts: worker
  become: true
  gather_facts: false

  tasks:
    - name: Install k3s agent
      ansible.builtin.include_tasks: tasks/install_k3s_worker.yml

- name: Fetch k3s config to controller
  hosts: manager
  gather_facts: false

  tasks:
    - name: Copy k3s config
      become: true
      ansible.builtin.fetch:
        src: /etc/rancher/k3s/k3s.yaml
        dest: "{{ playbook_dir }}/kubeconfig.yml"
        flat: yes

- name: Set up logs directory on all nodes
  hosts: all
  become: true
  gather_facts: false

  tasks:
    - name: Set up logs
      ansible.builtin.include_tasks: tasks/setup_logs.yml

- name: Configure network prober
  hosts: manager:worker
  tags: jalla
  become: true

  vars:
    manager_bat_ip: "{{ manager_mesh_ip }}"

  tasks:
    - name: Configure network prober
      ansible.builtin.include_tasks: tasks/configure_prober.yml
