---
# Usage: ansible-playbook -i inventories/static.ini provision_all.yml
#
# Facts are gathered once in the first play (hosts: all).
# All subsequent plays set gather_facts: false — hostvars retains the
# cached facts for the entire playbook run, so nothing is lost.

- name: Set hostname on all nodes
  hosts: all
  become: true

  tasks:
    - name: Compute hostname from group and position
      ansible.builtin.set_fact:
        pi_hostname: >-
          {{
            (group_names | reject('equalto', 'all') | first) ~
            groups[(group_names | reject('equalto', 'all') | first)].index(inventory_hostname)
          }}

    - name: Disable cloud-init
      ansible.builtin.include_tasks: tasks/disable_cloud_init.yml

    - name: Set hostname
      ansible.builtin.include_tasks: tasks/set_hostname.yml

    - name: Configure bashrc prompt
      ansible.builtin.include_tasks: tasks/configure_bashrc_prompt.yml
      tags: configure_prompt

- name: Provision common network config
  hosts: all
  become: true
  gather_facts: false
  vars:
    mesh_ip_prefix: "192.168.42"
    base_ip_start: 1

  tasks:
    - name: Provision network on node
      ansible.builtin.include_tasks: tasks/00_configure_network_common.yml
      vars:
        mesh_ip: "{{ mesh_ip_prefix }}.{{ base_ip_start + groups['all'].index(inventory_hostname) }}"
        gateway_ip: "{{ mesh_ip_prefix }}.{{ base_ip_start }}"

    - name: Recover from network cataclysm
      ansible.builtin.add_host:
        name: "{{ inventory_hostname }}"
        ansible_host: "{{ inventory_hostname }}.local"

    - name: Reset connection
      ansible.builtin.meta: reset_connection
    
    - name: Wait for connection
      ansible.builtin.wait_for_connection:
        delay: 5
        timeout: 60

    - name: Reattach bat0 interface
      ansible.builtin.command: ip link set wlan0 master bat0

- name: Configure NAT routing on manager
  hosts: manager
  become: true
  gather_facts: false
  vars:
    wan_interface: eth0
    bat_interface: bat0

  tasks:
    - name: Configure NAT
      ansible.builtin.include_tasks: tasks/configure_nat.yml

- name: Configure DHCP/DNS on manager
  hosts: manager
  become: true
  gather_facts: false
  vars:
    bat_interface: bat0
    dhcp_start: "192.168.42.2"
    dhcp_end: "192.168.42.254"
    lease_time: 12
  tasks:
    - name: Configure dnsmasq
      ansible.builtin.include_tasks: tasks/configure_dhcp_server.yml

- name: Install k3s server on manager
  hosts: manager
  become: true
  gather_facts: false

  tasks:
    - name: Install k3s server
      ansible.builtin.include_tasks: tasks/install_k3s_manager.yml

- name: Configure cgroup parameters on workers
  hosts: worker
  become: true
  gather_facts: false

  tasks:
    - name: Configure cgroups
      ansible.builtin.include_tasks: tasks/configure_cgroups.yml

- name: Fetch k3s join token from manager
  hosts: manager
  become: true
  gather_facts: false

  tasks:
    - name: Read join token
      ansible.builtin.shell: cat /var/lib/rancher/k3s/server/node-token
      register: k3s_join_token

- name: Reboot workers to apply cgroup settings
  hosts: worker
  become: true
  gather_facts: false

  tasks:
    - name: Reboot
      ansible.builtin.reboot:
        reboot_timeout: 120
        post_reboot_delay: 60

- name: Install k3s agent on workers
  hosts: worker
  become: true
  gather_facts: false

  tasks:
    - name: Install k3s agent
      ansible.builtin.include_tasks: tasks/install_k3s_worker.yml

- name: Fetch k3s config to controller
  hosts: manager
  gather_facts: false

  tasks:
    - name: Copy k3s config
      become: true
      ansible.builtin.fetch:
        src: /etc/rancher/k3s/k3s.yaml
        dest: "{{ playbook_dir }}/kubeconfig.yml"
        flat: yes

- name: Set up logs directory on all nodes
  hosts: all
  become: true
  gather_facts: false

  tasks:
    - name: Set up logs
      ansible.builtin.include_tasks: tasks/setup_logs.yml

- name: Configure network prober
  hosts: manager:worker
  tags: jalla
  become: true

  vars:
    manager_bat_ip: 192.168.42.1

  tasks:
    - name: Configure network prober
      ansible.builtin.include_tasks: tasks/configure_prober.yml

- name: Reboot workers
  hosts: worker
  become: true
  gather_facts: false

  tasks:
    - name: Reboot
      ansible.builtin.reboot:
        reboot_timeout: 120
        post_reboot_delay: 10
