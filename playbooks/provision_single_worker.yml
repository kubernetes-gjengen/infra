---
# Usage: ansible-playbook -i inventories/static.ini provision_single_worker.yml \
#          -e "new_host_ip=192.168.3.X pi_hostname=worker4"
- name: Add new worker to runtime inventory
  hosts: localhost
  gather_facts: false
  vars:
    mesh_ip_prefix: "192.168.42"

  tasks:
    - name: Abort if host already in inventory
      ansible.builtin.meta: end_play
      when: new_host_ip in groups['all']

    - name: Calculate mesh IP
      ansible.builtin.set_fact:
        assigned_ip: "{{ mesh_ip_prefix }}.{{ groups['all'] | length + 1 }}"

    - name: Add host to runtime inventory
      ansible.builtin.add_host:
        name: "{{ pi_hostname }}"
        ansible_host: "{{ new_host_ip }}"
        ansible_user: pi
        ansible_password: raspberry
        ansible_become_pass: raspberry
        assigned_ip: "{{ assigned_ip }}"
        groups: new_workers

- name: Set hostname on new worker
  hosts: new_workers
  become: true

  tasks:
    - name: Disable cloud-init
      ansible.builtin.include_tasks: tasks/disable_cloud_init.yml

    - name: Set hostname
      ansible.builtin.include_tasks: tasks/set_hostname.yml

- name: Provision batman mesh on new worker
  hosts: new_workers
  become: true
  vars:
    mesh_ip_prefix: "192.168.42"
    base_ip_start: 1

  tasks:
    - name: Provision batman on node
      ansible.builtin.include_tasks: tasks/provision_batman_node.yml
      vars:
        mesh_ip: "{{ assigned_ip }}"
        gateway_ip: "{{ mesh_ip_prefix }}.{{ base_ip_start }}"

- name: Install k3s agent on new worker
  hosts: new_workers
  become: true

  tasks:
    - name: Install k3s agent
      ansible.builtin.include_tasks: tasks/install_k3s_worker.yml

- name: Set up logs directory
  hosts: new_workers
  become: true

  tasks:
    - name: Set up logs
      ansible.builtin.include_tasks: tasks/setup_logs.yml

- name: Persist new worker to inventory
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Add worker to dynamic inventory
      ansible.builtin.lineinfile:
        path: "{{ playbook_dir }}/inventories/dynamic.ini"
        insertafter: '^\[worker\]'
        line: "{{ pi_hostname }} ansible_host={{ new_host_ip }} ansible_user=pi ansible_password=raspberry ansible_become_pass=raspberry assigned_ip={{ hostvars[pi_hostname].assigned_ip }}"
