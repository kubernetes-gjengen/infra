---
# Configures batman-adv + the netplan profile for bat0/eth0.
#
# The manager's static bat0 address comes from `manager_mesh_ip`
# (group_vars/all.yml); workers get bat0 via DHCP from the manager. This file
# only *renders* the netplan config and registers `netplan_cfg` - the calling
# play runs `netplan apply` afterwards so it can handle the connection drop.

- name: Install dependencies
  ansible.builtin.apt:
    name:
      - batctl
      - wireless-tools
      - systemd-resolved
    state: present

- name: Load batman-adv kernel module
  ansible.builtin.command: modprobe batman-adv
  changed_when: false

- name: Stop wpa_supplicant
  ansible.builtin.systemd:
    name: wpa_supplicant
    enabled: false
    state: stopped

- name: Unblock wifi (rfkill)
  ansible.builtin.command: rfkill unblock wifi
  changed_when: false

- name: Unblock wifi (nmcli radio)
  ansible.builtin.command: nmcli radio wifi on #ensures the system doesn't brick itself if someone re-enables NM
  failed_when: false
  changed_when: false

- name: Banish NetworkManager to the shadow realm
  ansible.builtin.systemd:
    name: NetworkManager
    enabled: false
    state: stopped

- name: Deploy config_batman2_electric_boogaloo.sh
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../shellscripts/config_batman2_electric_boogaloo.sh"
    dest: /usr/local/bin/config_batman.sh
    mode: "0755"
  register: batman_script

- name: Deploy batman systemd service
  ansible.builtin.copy:
    dest: /etc/systemd/system/batman.service
    mode: "0644"
    content: |
      [Unit]
      Description=Config and start batman
      After=network.target
      After=systemd-user-sessions.service

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      ExecStart=/usr/local/bin/config_batman.sh

      [Install]
      WantedBy=multi-user.target
  register: batman_unit

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true

- name: Enable and start batman service
  ansible.builtin.systemd:
    name: batman
    enabled: true
    state: started

# batman.service is Type=oneshot with RemainAfterExit=yes, so on an
# already-provisioned node it's sitting at `active (exited)` and the
# `state: started` above is a no-op even when the script/unit content just
# changed underneath it (e.g. a routing-algorithm switch) - systemd doesn't
# re-run a oneshot just because its ExecStart file changed. Without this,
# only nodes provisioned fresh (or manually rebooted) would ever pick up a
# script change; already-running nodes would silently keep whatever
# algorithm/config was active since their last start, splitting the mesh.
- name: Restart batman service to pick up script/unit changes
  ansible.builtin.systemd:
    name: batman
    state: restarted
  when: batman_script is changed or batman_unit is changed

- name: Enable networkd
  ansible.builtin.systemd:
    name: systemd-networkd
    enabled: true
    state: started

- name: Deploy netplan config
  ansible.builtin.template:
    src: "{{ playbook_dir }}/templates/90-netplan-workers.yml.j2"
    dest: "/etc/netplan/90-netplan-batman.yaml"
    mode: "0600"
  register: netplan_cfg

