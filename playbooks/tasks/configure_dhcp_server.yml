---
#vars: dhcp_start, dhcp_end, lease_time (in hours)
- name: Install dnsmasq
  ansible.builtin.apt:
    name: dnsmasq
    state: present

- name: Install systemd-resolved
  ansible.builtin.apt:
    name: systemd-resolved
    state: present

- name: Set dnsmasq (loopback) as the DNS resolver
  ansible.builtin.lineinfile:
    path: /etc/systemd/resolved.conf
    regexp: '^\s*#?DNS\b'
    line: "DNS=127.0.0.1"

- name: Clear fallback DNS to prevent external leaks
  ansible.builtin.lineinfile:
    path: /etc/systemd/resolved.conf
    regexp: '^\s*#?FallbackDNS\b'
    line: "FallbackDNS="

- name: Set .gotham as the local DNS search domain
  ansible.builtin.lineinfile:
    path: /etc/systemd/resolved.conf
    regexp: '^\s*#?Domains\b'
    line: "Domains=~gotham"

- name: Disable systemd-resolved stub listener so dnsmasq can bind port 53
  ansible.builtin.lineinfile:
    path: /etc/systemd/resolved.conf
    regexp: '^\s*#?DNSStubListener\b'
    line: "DNSStubListener=no"

- name: Deploy dnsmasq config
  ansible.builtin.template:
    src: "{{ playbook_dir }}/templates/dnsmasq.conf.j2"
    dest: /etc/dnsmasq.conf
    owner: root
    group: root
    mode: "0644"

- name: restart dnsmasq
  ansible.builtin.systemd_service:
    name: dnsmasq
    state: restarted