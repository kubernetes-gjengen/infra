---
- name: Read cmdline.txt
  ansible.builtin.slurp:
    path: /boot/firmware/cmdline.txt
  register: cmdline

- name: Build updated cmdline
  ansible.builtin.set_fact:
    new_cmdline: >-
      {{
        (
          [cmdline.content | b64decode | trim]
          + (
            [
              'cgroup_enable=cpuset',
              'cgroup_enable=memory',
              'cgroup_memory=1',
              'systemd.unified_cgroup_hierarchy=1'
            ]
            | reject('in', cmdline.content | b64decode)
            | list
          )
        ) | join(' ')
      }}

- name: Write updated cmdline.txt
  ansible.builtin.copy:
    dest: /boot/firmware/cmdline.txt
    content: "{{ new_cmdline }}\n"
    mode: "0644"
  when: new_cmdline != (cmdline.content | b64decode | trim)
  register: cmdline_write

# Exposed so callers can gate the (otherwise unconditional) reboot on an
# actual change - a reboot is only needed when cmdline.txt was rewritten.
- name: Record whether cgroup settings changed
  ansible.builtin.set_fact:
    cgroups_changed: "{{ cmdline_write is changed }}"
