---
# Shared by config-batman.yml (bulk, manually-inventoried run) and
# provision-single.yml (single host added dynamically by absorb.py).
# Expects: mesh_ip, gateway_ip.
#
# Mirrors config_batman.sh natively, without copying/running that script.
# The wlan0/NetworkManager switch can drop the SSH connection mid-flight,
# so it runs detached (nohup) and fire-and-forget (async/poll:0); we then
# wait for the connection to come back instead of waiting on the task.

- name: Install batman
  ansible.builtin.apt:
    name: batctl
    state: present

- name: Load batman-adv kernel module
  ansible.builtin.command: modprobe batman-adv
  changed_when: false

- name: Configure wlan0 ad-hoc mesh and bat0 (disconnects SSH briefly)
  ansible.builtin.shell: |
    nohup bash -c '
    systemctl stop wpa_supplicant
    systemctl stop NetworkManager
    rfkill unblock wifi
    ip link set wlan0 down
    iwconfig wlan0 mode ad-hoc
    iwconfig wlan0 essid meshnet
    iwconfig wlan0 channel 1
    ip link set wlan0 up
    batctl if add wlan0
    ifconfig bat0 up
    ip addr flush dev bat0
    ip addr add {{ mesh_ip }}/24 dev bat0
    ip link set bat0 up
    ip route add default via {{ gateway_ip }} dev bat0
    ' > /var/log/config_batman.log 2>&1
  async: 10
  poll: 0
  ignore_unreachable: true

- name: Wait for connection
  ansible.builtin.wait_for_connection:
    delay: 5
    timeout: 60

- name: Read mesh configuration log
  ansible.builtin.command: cat /var/log/config_batman.log
  register: mesh_config_log
  changed_when: false

- name: Show mesh configuration output
  ansible.builtin.debug:
    var: mesh_config_log.stdout_lines

- name: Deploy config_batman.sh
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../shellscripts/config_batman.sh"
    dest: /usr/local/bin/config_batman.sh
    mode: "0755"

- name: Deploy batman systemd service
  ansible.builtin.copy:
    dest: /etc/systemd/system/batman.service
    mode: "0644"
    content: |
      [Unit]
      Description=Config and start batman
      After=network.target
      After=systemd-user-sessions.service

      [Service]
      Type=oneshot
      ExecStart=/usr/local/bin/config_batman.sh {{ mesh_ip }} {{ gateway_ip }}

      [Install]
      WantedBy=multi-user.target

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true

- name: Enable batman service
  ansible.builtin.systemd:
    name: batman
    enabled: true
