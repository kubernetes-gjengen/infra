---
- name: Configure cgroup parameters
  ansible.builtin.include_tasks: configure_cgroups.yml

- name: Reboot to apply cgroup settings
  ansible.builtin.reboot:
    reboot_timeout: 120
    post_reboot_delay: 60
  when: cgroups_changed | default(false)

- name: Check whether k3s is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k3s_bin

- name: Install k3s server
  ansible.builtin.shell: |
    set -o pipefail
    curl -sfL https://get.k3s.io | sh -
  args:
    executable: /bin/bash
  when: not k3s_bin.stat.exists

- name: Wait for node-token to appear
  ansible.builtin.wait_for:
    path: /var/lib/rancher/k3s/server/node-token
    state: present
    timeout: 60

- name: Read join token
  ansible.builtin.shell: cat /var/lib/rancher/k3s/server/node-token
  register: join_token
  changed_when: false
