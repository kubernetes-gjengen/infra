---
# Task list only (no hosts/become/vars/handlers) - this is loaded via
# include_tasks from the "Configure network prober" play in
# provision_all.yml, which supplies those. grpc_host/grpc_port and the
# Restart network_prober handler live on that calling play.

- name: Ensure nameserver is configured
  ansible.builtin.lineinfile:
    path: /etc/resolv.conf
    line: "nameserver 1.1.1.1"
    state: present

- name: Install iperf3 and jq and mosquitto-clients
  ansible.builtin.apt:
    name: [iperf3, jq, mosquitto-clients]
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Enable and start iperf3 server
  ansible.builtin.systemd:
    name: iperf3
    enabled: true
    state: started

- name: Install grpcurl
  ansible.builtin.unarchive:
    src: https://github.com/fullstorydev/grpcurl/releases/download/v1.9.3/grpcurl_1.9.3_linux_arm64.tar.gz
    dest: /usr/local/bin
    remote_src: true
    creates: /usr/local/bin/grpcurl

# - name: Add bat0 mesh IPs to /etc/hosts
#   ansible.builtin.lineinfile:
#     path: /etc/hosts
#     regexp: '\s{{ hostvars[item].inventory_hostname }}$'
#     line: "{{ hostvars[item].assigned_ip }} {{ hostvars[item].inventory_hostname }}"
#     state: present
#   loop: "{{ groups['all'] }}"

# network_prober.sh's get_neighbors() relies on batctl resolving MACs to
# node names via /etc/bat-hosts - without it, `batctl o` prints raw MACs,
# and the "$neighbor".gotham hostname the script builds for throughput
# probing turns into an unresolvable "aa:bb:cc:dd:ee:ff.gotham". Every host
# computes the same bat_hosts_content independently (rather than a
# run_once + hostvars[] indirection) so this doesn't depend on every host
# reaching this task in the same forks batch - relies on ansible.cfg's
# forks being >= the fleet size so every host has already set its own
# bat_mac fact by the time any host reads the others' via hostvars.
- name: Get wlan0 MAC address
  ansible.builtin.command: cat /sys/class/net/wlan0/address
  register: wlan_mac
  changed_when: false

- name: Store BATMAN MAC
  ansible.builtin.set_fact:
    bat_mac: "{{ wlan_mac.stdout | trim }}"

- name: Slurp existing bat-hosts entries
  ansible.builtin.slurp:
    src: /etc/bat-hosts
  register: existing_bat_hosts
  failed_when: false

# groups['all'] only holds hosts the dynamic inventory could reach this run
# (see inventories/discover.py) - a powered-off node is dropped entirely, not
# just marked unreachable. Overwriting from groups['all'] alone would erase
# its MAC->name entry every time any node is down. Merge onto whatever this
# host already has on disk instead, so down nodes' entries survive; live
# entries win on conflict since they're fresher than whatever's on disk.
- name: Parse existing bat-hosts entries
  ansible.builtin.set_fact:
    bat_hosts_map: "{{ bat_hosts_map | default({}) | combine({(item.split(' ')[0]): item.split(' ')[1]}) }}"
  loop: "{{ (existing_bat_hosts.content | b64decode).splitlines() if existing_bat_hosts.content is defined else [] }}"
  when: item | trim != ''

- name: Merge in bat-hosts entries known this run
  ansible.builtin.set_fact:
    bat_hosts_map: "{{ bat_hosts_map | default({}) | combine({hostvars[item].bat_mac: item}) }}"
  loop: "{{ groups['all'] }}"
  when: hostvars[item].bat_mac is defined

- name: Build bat-hosts content
  ansible.builtin.set_fact:
    bat_hosts_content: |
      {% for mac, host in bat_hosts_map.items() %}
      {{ mac }} {{ host }}
      {% endfor %}

- name: Install /etc/bat-hosts
  ansible.builtin.copy:
    dest: /etc/bat-hosts
    content: "{{ bat_hosts_content }}"
    owner: root
    group: root
    mode: "0644"
  notify: Restart network_prober

- name: Copy message.proto
  ansible.builtin.copy:
    src: files/message.proto
    dest: /home/pi/message.proto
    owner: pi
    group: pi
    mode: "0644"
  notify: Restart network_prober

- name: Copy agent script
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../shellscripts/network_prober.sh"
    dest: /home/pi/network_prober.sh
    owner: root
    group: root
    mode: "0755"
  notify: Restart network_prober

- name: Deploy systemd service
  ansible.builtin.copy:
    dest: /etc/systemd/system/network_prober.service
    mode: "0644"
    content: |
      [Unit]
      Description=Batman-adv network probe agent
      After=network.target batman.service

      [Service]
      ExecStart=/home/pi/network_prober.sh
      Restart=always
      RestartSec=10
      # Environment="GRPC_HOST={{ grpc_host }}"
      # Environment="GRPC_PORT={{ grpc_port }}"
      Environment="NODE_ID={{ inventory_hostname }}"
      Environment="BAT_IFACE=bat0"
      Environment="PROTO_FILE=/home/pi/message.proto"
      Environment="LATENCY_INTERVAL=5"
      Environment="THROUGHPUT_EVERY=6"

      [Install]
      WantedBy=multi-user.target
  notify: Restart network_prober

- name: Enable and start network_prober
  ansible.builtin.systemd:
    name: network_prober
    daemon_reload: true
    enabled: true
    state: started
