# gethomepage/homepage - link aggregator for the cluster's frontends
# (maviz, bapi, object-detection, sensehat-frontend) plus the Zot registry
# UI. Public ghcr.io image (arm64), so - like mosquitto.yml - it's pulled
# directly rather than pushed through the local Zot registry.
#
# Scheduled on capability/gui the same way maviz/bapi are, since it's just
# another browser-facing frontend. Reachable at http://dashboard.gotham -
# DNS record added in playbooks/templates/dnsmasq.conf.j2.
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
data:
  settings.yaml: |
    title: Gotham Cluster
    theme: dark
    headerStyle: clean
  widgets.yaml: |
    - datetime:
        format:
          dateStyle: long
          timeStyle: short
  bookmarks.yaml: |
    []
  services.yaml: |
    - Frontends:
        - MAVIZ:
            href: http://manager0.gotham:30880
            description: Mesh visualization
            siteMonitor: http://manager0.gotham:30880
        - BAPI:
            href: http://manager0.gotham:30800
            description: Batman mesh API
            siteMonitor: http://manager0.gotham:30800
        - Object Detection:
            href: http://manager0.gotham:30808
            description: AI camera live viewer
            siteMonitor: http://manager0.gotham:30808
        - Sense HAT Frontend:
            href: http://manager0.gotham:30080
            description: Sense HAT sensor dashboard
            siteMonitor: http://manager0.gotham:30080
    - Infrastructure:
        - Zot Registry:
            # No siteMonitor: self-signed TLS (see registry/README.md) makes
            # an automated health check unreliable here.
            href: https://manager0.gotham:30500
            description: OCI image registry + CVE scanning
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  labels:
    app: homepage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homepage
  template:
    metadata:
      labels:
        app: homepage
        capability/gui: "true"
    spec:
      schedulerName: custom-scheduler
      nodeSelector:
        capability/gui: "true"
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: homepage
          image: ghcr.io/gethomepage/homepage:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          livenessProbe:
            httpGet:
              path: /api/healthcheck
              port: http
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "300m"
              memory: "128Mi"
          volumeMounts:
            - name: config
              mountPath: /app/config/settings.yaml
              subPath: settings.yaml
            - name: config
              mountPath: /app/config/widgets.yaml
              subPath: widgets.yaml
            - name: config
              mountPath: /app/config/bookmarks.yaml
              subPath: bookmarks.yaml
            - name: config
              mountPath: /app/config/services.yaml
              subPath: services.yaml
      volumes:
        - name: config
          configMap:
            name: homepage-config
---
apiVersion: v1
kind: Service
metadata:
  name: homepage
spec:
  type: NodePort
  selector:
    app: homepage
  ports:
    - port: 3000
      targetPort: http
      nodePort: 30100
